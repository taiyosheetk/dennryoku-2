    <script>
// =================================================================
// TAIYOSHEET 電力計算ツール - 追加機能パッチ v1
//   ① 計算根拠パネル
//   ② プロジェクト管理（保存・読込・JSON 書出/読込）
//   ③ Excel エクスポート（入力データ + 画面テーブル一括）
// =================================================================
(function () {
  "use strict";

  const STORAGE_PREFIX = "rh:";
  const PROJECT_PREFIX = "rh-proj:";
  const META_SUFFIX = "::__meta__";
  const XLSX_CDN = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";

  // ------ 汎用ユーティリティ ------
  const $$ = (html) => {
    const t = document.createElement("template");
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  };
  const esc = (s) =>
    String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const stamp = () => {
    const d = new Date(), p = (n) => String(n).padStart(2, "0");
    return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;
  };
  const loadScript = (src) =>
    new Promise((resolve, reject) => {
      if (document.querySelector(`script[data-ttx-src="${src}"]`)) return resolve();
      const s = document.createElement("script");
      s.src = src;
      s.setAttribute("data-ttx-src", src);
      s.onload = resolve;
      s.onerror = () => reject(new Error("外部ライブラリの読み込みに失敗"));
      document.head.appendChild(s);
    });
  const downloadBlob = (blob, name) => {
    const url = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement("a"), { href: url, download: name });
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };
  const downloadJSON = (data, name) =>
    downloadBlob(new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }), name);

  // ------ localStorage 操作 ------
  const isCurrent = (k) => k && k.startsWith(STORAGE_PREFIX) && !k.startsWith(PROJECT_PREFIX);
  function getCurrentSettings() {
    const out = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (isCurrent(k)) out[k] = localStorage.getItem(k);
    }
    return out;
  }
  function listProjects() {
    const set = new Set();
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(PROJECT_PREFIX)) {
        const rest = k.slice(PROJECT_PREFIX.length);
        const idx = rest.indexOf(META_SUFFIX);
        if (idx > 0) set.add(rest.slice(0, idx));
        else {
          const c = rest.indexOf(":");
          if (c > 0) set.add(rest.slice(0, c));
        }
      }
    }
    return [...set].sort();
  }
  function getProjectMeta(name) {
    try { return JSON.parse(localStorage.getItem(PROJECT_PREFIX + name + META_SUFFIX) || "null"); } catch { return null; }
  }
  function deleteProject(name) {
    const pfx = PROJECT_PREFIX + name;
    const rm = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && (k.startsWith(pfx + ":") || k === pfx + META_SUFFIX)) rm.push(k);
    }
    rm.forEach((k) => localStorage.removeItem(k));
  }
  function saveProject(name) {
    if (!name || name.includes(":")) throw new Error("プロジェクト名にコロン(:)は使えません");
    deleteProject(name);
    const settings = getCurrentSettings();
    Object.entries(settings).forEach(([k, v]) => {
      localStorage.setItem(PROJECT_PREFIX + name + ":" + k.slice(STORAGE_PREFIX.length), v);
    });
    localStorage.setItem(
      PROJECT_PREFIX + name + META_SUFFIX,
      JSON.stringify({ savedAt: new Date().toISOString(), keyCount: Object.keys(settings).length })
    );
  }
  function loadProject(name) {
    // 現在を退避クリア
    const rm = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (isCurrent(k)) rm.push(k);
    }
    rm.forEach((k) => localStorage.removeItem(k));
    // 復元
    const pfx = PROJECT_PREFIX + name + ":";
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(pfx) && !k.endsWith(META_SUFFIX)) {
        localStorage.setItem(STORAGE_PREFIX + k.slice(pfx.length), localStorage.getItem(k));
      }
    }
  }
  function exportSettingsAsJSON(name) {
    const data = { name, exportedAt: new Date().toISOString(), tool: "TAIYOSHEET電力計算v8.12+Tools", settings: {} };
    if (name === "__current__") {
      data.settings = getCurrentSettings();
    } else {
      const pfx = PROJECT_PREFIX + name + ":";
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(pfx) && !k.endsWith(META_SUFFIX)) {
          data.settings[STORAGE_PREFIX + k.slice(pfx.length)] = localStorage.getItem(k);
        }
      }
    }
    return data;
  }

  // ------ モーダル ------
  function openModal(title, contentEl) {
    const backdrop = $$(`<div class="ttx-modal-backdrop"></div>`);
    const modal = $$(`
      <div class="ttx-modal" role="dialog" aria-modal="true">
        <div class="ttx-modal-header">
          <div class="ttx-modal-title"></div>
          <button class="ttx-modal-close" aria-label="閉じる">✕</button>
        </div>
        <div class="ttx-modal-body"></div>
      </div>`);
    modal.querySelector(".ttx-modal-title").textContent = title;
    modal.querySelector(".ttx-modal-body").appendChild(contentEl);
    backdrop.appendChild(modal);
    document.body.appendChild(backdrop);
    const close = () => backdrop.remove();
    modal.querySelector(".ttx-modal-close").addEventListener("click", close);
    backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
    const onKey = (e) => { if (e.key === "Escape") { close(); document.removeEventListener("keydown", onKey); } };
    document.addEventListener("keydown", onKey);
    return { close };
  }

  // ------ ① 計算根拠 ------
  function openReference() {
    const content = $$(`

        <p class="ttx-ref-intro">本アプリで使用している計算式・係数・標準値の一覧です。提出資料の質疑応答や新人教育にご活用ください。</p>

        <details open>
          <summary>1. 電流計算</summary>
          <table>
            <tr><th>配線方式</th><th>計算式</th></tr>
            <tr><td>単相2線・単相3線</td><td>I = P × 1000 ÷ V</td></tr>
            <tr><td>三相3線・三相4線</td><td>I = P × 1000 ÷ (√3 × V)</td></tr>
          </table>
          <p class="ttx-note">P: 負荷電力 [kW]、V: 線間電圧 [V]、I: 線電流 [A]</p>
        </details>

        <details open>
          <summary>2. 電圧降下（内線規程 3705-1）</summary>
          <p class="ttx-formula">e [V] = K × L [m] × I [A] ÷ (1000 × A [mm²])</p>
          <table>
            <tr><th>配線方式</th><th>係数 K</th></tr>
            <tr><td>単相2線</td><td>35.6</td></tr>
            <tr><td>単相3線・三相4線</td><td>17.8</td></tr>
            <tr><td>三相3線</td><td>30.8</td></tr>
          </table>
          <p class="ttx-note">許容電圧降下率は本アプリで設定可（一般に 2% 以下を目安）。受電点から末端ヒーターまでの累積で評価。</p>
        </details>

        <details>
          <summary>3. ケーブル選定（許容電流＆電圧降下の AND 条件）</summary>
          <p>以下の<strong>両方</strong>を満たす最小ケーブルを自動選定：</p>
          <ol>
            <li>許容電流：I_amp ≥ I × 安全率（既定 1.0、設定可）</li>

          </ol>
          <p>種別：CV ケーブル（JIS C 3605）　布設：地中／空中を選択可</p>
          <p class="ttx-note">標準サイズ：2 / 3.5 / 5.5 / 8 / 14 / 22 / 38 / 60 / 100 / 150 / 200 / 250 / 325 [mm²]</p>
        </details>

        <details>
          <summary>4. MCCB（配線用遮断器）選定</summary>
          <p class="ttx-formula">定格 AT ≥ 連続負荷電流 × 1.25</p>
          <p class="ttx-note">連続負荷係数 1.25 は内線規程 1360-9 に準拠。標準フレーム：20 / 30 / 40 / 50 / 60 / 75 / 100 / 125 / 150 / 175 / 200 / 225 / 250 / 300 / 350 / 400 / 500 / 600 / 800 / 1000 / 1200 / 1600 [A]</p>
        </details>

        <details>
          <summary>5. 変圧器容量選定</summary>
          <p class="ttx-formula">kVA ≥ kW ÷ 力率（既定 0.95）× 余裕率（既定 1.25）</p>
          <p class="ttx-note">標準容量：10 / 20 / 30 / 50 / 75 / 100 / 150 / 200 / 300 / 500 / 750 / 1000 [kVA]　力率 0.95 はロードヒーティング負荷（純抵抗負荷 + 制御機器）の実用値</p>
        </details>

        <details>
          <summary>6. 高圧受電</summary>
          <p>受電電圧：<strong>6,600V 固定</strong>（日本の標準高圧配電）</p>
          <p class="ttx-formula">一次電流 I₁ = kVA × 1000 ÷ (√3 × 6600)</p>
          <p class="ttx-formula">高圧側電圧降下 e₁ = 30.8 × L₁ × I₁ ÷ (1000 × A₁)</p>
          <p class="ttx-note">50kW 超は原則高圧受電。キュービクル設置、保安規程届出、電気主任技術者選任（外部委託可）が必要。</p>
        </details>

        <details>
          <summary>7. ワーストケース電圧降下</summary>
          <p class="ttx-formula">e_total = e_高圧 + e_変圧器二次〜盤 + e_盤〜分岐</p>
          <p>各盤について「主幹電圧降下 + その盤の最悪分岐電圧降下」を合算し、その最大値を全系統のワーストケースとして表示。</p>
        </details>

        <details>
          <summary>8. 発熱量（TAIYOSHEET）</summary>
          <p class="ttx-formula">セット発熱量 [kW] = 本数 × 長さ [m] × 発熱密度 [W/m] ÷ 1000</p>
          <table>
            <tr><th>タイプ</th><th>発熱密度</th><th>標準構成（1セット）</th><th>セット発熱量</th></tr>
            <tr><td>省電力型</td><td>120 W/m</td><td>2本 × 50m</td><td>12 kW</td></tr>
            <tr><td>標準型</td><td>160 W/m</td><td>2本 × 50m</td><td>16 kW</td></tr>
            <tr><td>高出力型</td><td>200 W/m</td><td>2本 × 50m</td><td>20 kW</td></tr>
          </table>
        </details>

        <details>
          <summary>9. 警告レベルの判定条件</summary>
          <ul>
            <li><strong style="color:#B23A1F">alert</strong>：ワーストケース電圧降下 &gt; 許容値 × 2倍（重大・配線見直し必須）</li>
            <li><strong style="color:#C5532E">warn</strong>：ワーストケース電圧降下 &gt; 許容値</li>
            <li><strong style="color:#C5532E">warn</strong>：50kW 以上で電圧 200V 未満（200V/400V 推奨）</li>
            <li><strong style="color:#B23A1F">alert</strong>：50kW 以上で低圧受電を強制（契約上不可）</li>
            <li><strong style="color:#6B7D80">info</strong>：高圧受電（キュービクル・保安規程・電気主任技術者必要）</li>
          </ul>
        </details>

        <details>
          <summary>10. 主な出典・基準</summary>
          <ul>
            <li>内線規程 JEAC 8001（日本電気協会）</li>
            <li>電気設備技術基準（電技）</li>
            <li>JIS C 3605：600V架橋ポリエチレン絶縁ビニルシースケーブル</li>
            <li>電気事業法・電気関係報告規則</li>
            <li>低圧受電契約電力上限：49.9kW（事業所種別による）</li>
          </ul>
        </details>
      </div>`);

  // ------ ② プロジェクト管理 ------
  function openProjects() {
    const root = $$(`
      <div class="ttx-proj">
        <div class="ttx-proj-card">
          <h3>📂 現在の作業データ</h3>
          <p class="ttx-proj-count">localStorage キー数: <strong id="ttx-cur-count">0</strong></p>
          <div class="ttx-proj-actions">
            <input type="text" id="ttx-save-name" placeholder="プロジェクト名（例：国道45号 松島町）" />
            <button class="ttx-btn ttx-btn-primary" id="ttx-save">💾 名前を付けて保存</button>
            <button class="ttx-btn" id="ttx-export-cur">📤 JSON で書出</button>
            <button class="ttx-btn ttx-btn-danger" id="ttx-clear">🗑 現在の作業をクリア</button>
          </div>
        </div>

        <div class="ttx-proj-card">
          <h3>📥 JSON ファイルから読込</h3>
          <input type="file" id="ttx-import-file" accept=".json" />
          <p class="ttx-note">他PCで書き出した JSON を「現在の作業」または「新規プロジェクト名」として取り込めます。</p>
        </div>

        <div class="ttx-proj-card">
          <h3>📁 保存済みプロジェクト（<span id="ttx-proj-num">0</span> 件）</h3>
          <div id="ttx-proj-items"></div>
        </div>
      </div>`);

    const itemsEl = root.querySelector("#ttx-proj-items");
    const countEl = root.querySelector("#ttx-cur-count");
    const numEl = root.querySelector("#ttx-proj-num");

    function refresh() {
      countEl.textContent = Object.keys(getCurrentSettings()).length;
      const list = listProjects();
      numEl.textContent = list.length;
      itemsEl.innerHTML = "";
      if (list.length === 0) {
        itemsEl.innerHTML = '<p class="ttx-empty">まだ保存済みプロジェクトはありません</p>';
        return;
      }
      list.forEach((name) => {
        const meta = getProjectMeta(name);
        const savedAt = meta?.savedAt ? new Date(meta.savedAt).toLocaleString("ja-JP") : "—";
        const cnt = meta?.keyCount ?? "?";
        const item = $$(`
          <div class="ttx-proj-item">
            <div class="ttx-proj-item-info">
              <div class="ttx-proj-item-name"></div>
              <div class="ttx-proj-item-meta"></div>
            </div>
            <div class="ttx-proj-item-actions">
              <button class="ttx-btn ttx-btn-primary" data-act="load">📂 読込</button>
              <button class="ttx-btn" data-act="export">📤 書出</button>
              <button class="ttx-btn" data-act="rename">✏ 改名</button>
              <button class="ttx-btn ttx-btn-danger" data-act="delete">🗑 削除</button>
            </div>
          </div>`);
        item.querySelector(".ttx-proj-item-name").textContent = name;
        item.querySelector(".ttx-proj-item-meta").textContent = `保存日時: ${savedAt}　/　キー数: ${cnt}`;
        item.addEventListener("click", (e) => {
          const btn = e.target.closest("button[data-act]");
          if (!btn) return;
          const act = btn.dataset.act;
          if (act === "load") {
            if (confirm(`「${name}」を読み込みます。\n現在の作業データは上書きされます（事前に保存推奨）。\nページがリロードされます。続行しますか？`)) {
              loadProject(name);
              location.reload();
            }
          } else if (act === "export") {
            downloadJSON(exportSettingsAsJSON(name), `TAIYOSHEET_${name}_${stamp()}.json`);
          } else if (act === "rename") {
            const nn = prompt("新しい名前", name);
            if (nn && nn !== name && !nn.includes(":")) {
              const oldPfx = PROJECT_PREFIX + name;
              const newPfx = PROJECT_PREFIX + nn;
              const moves = [];
              for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k && (k.startsWith(oldPfx + ":") || k === oldPfx + META_SUFFIX)) moves.push(k);
              }
              moves.forEach((k) => {
                const nk = newPfx + k.slice(oldPfx.length);
                localStorage.setItem(nk, localStorage.getItem(k));
                localStorage.removeItem(k);
              });
              refresh();
            }
          } else if (act === "delete") {
            if (confirm(`「${name}」を完全に削除します。\nこの操作は取り消せません。続行しますか？`)) {
              deleteProject(name);
              refresh();
            }
          }
        });
        itemsEl.appendChild(item);
      });
    }
    refresh();

    root.querySelector("#ttx-save").addEventListener("click", () => {
      const name = root.querySelector("#ttx-save-name").value.trim();
      if (!name) return alert("プロジェクト名を入力してください");
      if (name.includes(":")) return alert("コロン(:)は使えません");
      if (listProjects().includes(name) && !confirm(`「${name}」は既に存在します。上書きしますか？`)) return;
      try {
        saveProject(name);
        root.querySelector("#ttx-save-name").value = "";
        refresh();
        alert(`「${name}」を保存しました`);
      } catch (e) { alert("保存エラー: " + e.message); }
    });

    root.querySelector("#ttx-export-cur").addEventListener("click", () => {
      const data = exportSettingsAsJSON("__current__");
      data.name = "作業中データ";
      downloadJSON(data, `TAIYOSHEET_作業中_${stamp()}.json`);
    });

    root.querySelector("#ttx-clear").addEventListener("click", () => {
      if (!confirm("現在の作業データをすべてクリアします。\n保存済みプロジェクトは消えません。\nページがリロードされます。続行しますか？")) return;
      const rm = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (isCurrent(k)) rm.push(k);
      }
      rm.forEach((k) => localStorage.removeItem(k));
      location.reload();
    });

    root.querySelector("#ttx-import-file").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.settings || typeof data.settings !== "object") throw new Error("JSON形式が正しくありません");
          const name = prompt("インポート先のプロジェクト名（空欄なら現在の作業に上書き）", data.name && data.name !== "作業中データ" ? data.name : "");
          if (name === null) return;
          if (name.trim() === "") {
            if (!confirm("現在の作業データを上書きします。\nページがリロードされます。続行しますか？")) return;
            const rm = [];
            for (let i = 0; i < localStorage.length; i++) {
              const k = localStorage.key(i);
              if (isCurrent(k)) rm.push(k);
            }
            rm.forEach((k) => localStorage.removeItem(k));
            Object.entries(data.settings).forEach(([k, v]) => {
              if (k.startsWith(STORAGE_PREFIX)) localStorage.setItem(k, v);
            });
            location.reload();
          } else {
            if (name.includes(":")) return alert("コロン(:)は使えません");
            if (listProjects().includes(name) && !confirm(`「${name}」は既に存在します。上書きしますか？`)) return;
            deleteProject(name);
            let cnt = 0;
            Object.entries(data.settings).forEach(([k, v]) => {
              if (k.startsWith(STORAGE_PREFIX)) {
                localStorage.setItem(PROJECT_PREFIX + name + ":" + k.slice(STORAGE_PREFIX.length), v);
                cnt++;
              }
            });
            localStorage.setItem(PROJECT_PREFIX + name + META_SUFFIX, JSON.stringify({
              savedAt: new Date().toISOString(), keyCount: cnt, importedFrom: file.name
            }));
            refresh();
            alert(`「${name}」としてインポートしました（${cnt} キー）`);
          }
        } catch (err) { alert("インポートエラー: " + err.message); }
        e.target.value = "";
      };
      reader.readAsText(file, "utf-8");
    });

    openModal("💾 プロジェクト管理", root);
  }

  // ------ ③ Excel エクスポート ------
  async function exportExcel() {
    try {
      await loadScript(XLSX_CDN);
    } catch (e) {
      return alert("Excel ライブラリの読み込みに失敗しました。\nインターネット接続を確認してください。\n" + e.message);
    }
    const xlsx = window.XLSX;
    if (!xlsx) return alert("SheetJS が利用できません");

    const wb = xlsx.utils.book_new();

    // メタ情報
    const tableNum = document.querySelectorAll("#root table").length;
    const settings = getCurrentSettings();
    const metaRows = [
      ["項目", "値"],
      ["出力ファイル", "TAIYOSHEET 電力計算結果"],
      ["出力日時", new Date().toLocaleString("ja-JP")],
      ["ツール", "TAIYOSHEET電力計算 v8.12 (fixed) + Tools v1"],
      ["抽出テーブル数", tableNum],
      ["入力データ キー数", Object.keys(settings).length],
      [""],
      ["備考", "本ファイルは画面表示中の計算結果と入力データを書き出したものです"],
      ["", "提出書類への転記時は最終確認をお願いします"],
    ];
    const wsMeta = xlsx.utils.aoa_to_sheet(metaRows);
    wsMeta["!cols"] = [{ wch: 22 }, { wch: 60 }];
    xlsx.utils.book_append_sheet(wb, wsMeta, "出力情報");

    // 入力データシート
    const settingsRows = [["キー", "値"]];
    Object.entries(settings).sort().forEach(([k, v]) => {
      let val = v;
      try {
        const parsed = JSON.parse(v);
        if (typeof parsed === "object" && parsed !== null) val = JSON.stringify(parsed, null, 2);
      } catch { /* keep raw */ }
      settingsRows.push([k.slice(STORAGE_PREFIX.length), val]);
    });
    const wsIn = xlsx.utils.aoa_to_sheet(settingsRows);
    wsIn["!cols"] = [{ wch: 30 }, { wch: 80 }];
    xlsx.utils.book_append_sheet(wb, wsIn, "入力データ");

    // 画面上の各テーブル
    const tables = document.querySelectorAll("#root table");
    let idx = 0;
    tables.forEach((table) => {
      idx++;
      if (table.rows.length === 0) return;

      // タイトル推定
      let title = "";
      const cap = table.querySelector("caption");
      if (cap) title = cap.textContent.trim();
      if (!title) {
        let prev = table.previousElementSibling, scans = 0;
        while (prev && scans < 6 && !title) {
          if (/^H[1-6]$/i.test(prev.tagName)) { title = prev.textContent.trim(); break; }
          const h = prev.querySelector && prev.querySelector("h1,h2,h3,h4,h5,h6");
          if (h) { title = h.textContent.trim(); break; }
          prev = prev.previousElementSibling;
          scans++;
        }
      }
      if (!title) {
        let p = table.parentElement;
        for (let d = 0; d < 4 && p && !title; d++) {
          const h = p.querySelector && p.querySelector("h1,h2,h3,h4,h5,h6");
          if (h) title = h.textContent.trim();
          p = p.parentElement;
        }
      }
      const baseName = (title || `表${idx}`).slice(0, 25).replace(/[\/\\?*\[\]:]/g, "_").trim();

      // 行抽出
      const rows = [];
      table.querySelectorAll("tr").forEach((tr) => {
        const row = [];
        tr.querySelectorAll("th,td").forEach((cell) => {
          const text = cell.textContent.replace(/\s+/g, " ").trim();
          const numeric = text.replace(/,/g, "");
          if (numeric !== "" && /^-?\d+(\.\d+)?$/.test(numeric)) row.push(parseFloat(numeric));
          else row.push(text);
        });
        rows.push(row);
      });
      if (rows.length === 0) return;

      const ws = xlsx.utils.aoa_to_sheet(rows);
      const colCount = Math.max(...rows.map((r) => r.length));
      ws["!cols"] = Array(colCount).fill(0).map((_, ci) => {
        const maxLen = rows.reduce((m, r) => Math.max(m, String(r[ci] ?? "").length), 0);
        return { wch: Math.min(50, Math.max(8, maxLen + 2)) };
      });

      let name = baseName || `表${idx}`;
      let suf = 2;
      while (wb.SheetNames.includes(name)) { name = (baseName || `表${idx}`).slice(0, 22) + "_" + suf; suf++; }
      xlsx.utils.book_append_sheet(wb, ws, name);
    });

    xlsx.writeFile(wb, `TAIYOSHEET電力計算_${stamp()}.xlsx`);
  }

        else if (btn.dataset.tool === "proj") openProjects();
        else if (btn.dataset.tool === "xlsx") exportExcel();
      } catch (err) { console.error("[TTX]", err); alert("エラー: " + err.message); }
    });
    document.body.appendChild(bar);
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", () => setTimeout(setupToolbar, 300));
  } else {
    setTimeout(setupToolbar, 300);
  }
})();

    </script>
  </body>
</html>
